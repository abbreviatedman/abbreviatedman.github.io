<!DOCTYPE HTML>
<html lang="en">

  <style>
    .box-shadow { box-shadow: 0 .25rem .75rem rgba(0, 0, 0, .05); }
    .no-link-styles, .no-link-styles:hover { color: black; text-decoration: none; }
    .nav-button {margin: 10px;}
  </style>

<head>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
  <script src="https://unpkg.com/vue"></script>

</head>
<body>
  <div class="app">

    <div class="album py-5 bg-light">
      <div class="container text-center">
        <div class="col-md-12">
          <div class="row">
            <div class="col-md">
              <h1>Colin Jaffe</h1>
            </div>
          </div>
          <hr>
          <div class="row">
            <div class="col-md">
              <button
              type="button"
                class="btn btn-lg nav-button"
                :class="projectsButtonClasses"
                @click="changeToProjectsView"
                :disabled="section === 'projects'"
              >
                Projects
              </button>
            </div>
            <div class="col-md">
                <button
                type="button"
                  class="btn btn-lg nav-button"
                  :class="technologiesButtonClasses"
                  @click="changeToTechnologiesView"
                  :disabled="section === 'technologies'"
                >
                  Technologies
                </button>
              </div>
            <div class="col">
              <button
                type="button"
                class="btn btn-lg nav-button"
                :class="hobbiesButtonClasses"
                :disabled="section === 'hobbies'"
                @click="changeToHobbiesView"
              >
                Hobbies
              </button>
            </div>
          </div>
          <hr>
          <div class="row">
              <div class="col">
                <h3>{{sectionTitle}}</h1>
              </div>
            </div>
          <div class="row" v-if="section === 'hobbies'">
            <app-card
            v-for="(hobby, index) in hobbies"
            :key="index"
            :title="hobby.title"
            :copy="hobby.copy"
            :img-uri="hobby.imgUri"
            :link-uri="hobby.linkUri"
            ></app-card>
          </div>
          <div class="row" v-if="section === 'projects'">
            <app-card
            v-for="(project, index) in projects"
            :key="index"
            :title="project.title"
            :copy="project.copy"
            :img-uri="project.imgUri"
            :link-uri="project.linkUri"
            ></app-card>
          </div>
          <div class="row" v-if="section === 'technologies'">
              <app-card
              v-for="(technology, index) in technologies"
              :key="index"
              :title="technology.title"
              :copy="technology.copy"
              :img-uri="technology.imgUri"
              :link-uri="technology.linkUri"
              ></app-card>
            </div>
        </div>
      </div>
    </div>
  </div>
</div>

<template id="app-card-template">
  <div class="card mb-4 box-shadow col-md-4">
    <a :href="linkUri" class="no-link-styles">
      <div class="card-img-top">
        <img :src="imgUri">
      </div>
      <div class="card-body">
        <h5>{{title}}</h5>
        <p class="card-text">
          {{copy}}
        </p>
      </div>
    </a>
    </div>
</template>

    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>

    <script src="./js/appData.js"></script>
    <script src="./js/appComputed.js"></script>
    <script src="./js/appMethods.js"></script>
    <script src="./js/Card.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
