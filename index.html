<!DOCTYPE HTML>
<html lang="en">
  
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="index.css" type="text/css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.18.0/axios.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.5.17/dist/vue.min.js"></script>
    <title>Colin Jaffe's Personal Site</title>
  </head>

  <body>
    <div class="app">
      <header class="header">
        <h1>Colin Jaffe's Personal Site</h1>
      </header>
      <hr>
      <nav class="button-row">
        <button
          type="button"
          class="button"
          :class="projectsButtonClasses"
          @click="changeToProjectsView"
        >
          Projects
        </button>
        <button
          type="button"
          class="button"
          :class="technologiesButtonClasses"
          @click="changeToTechnologiesView"
        >
          Technologies
        </button>
        <button
          type="button"
          class="button"
          :class="hobbiesButtonClasses"
          @click="changeToHobbiesView"
        >
          Hobbies
        </button>
      </nav>
      <section class="row" v-if="section === 'hobbies'">
          <app-card
            v-for="(hobby, index) in hobbies"
            :key="index"
            :title="hobby.title"
            :copy="hobby.copy"
            :img-uri="hobby.imgUri"
            :link-uri="hobby.linkUri"
          >
          </app-card>
      </section>
      <section class="row" v-if="section === 'projects'">
          <app-card
            v-for="(project, index) in projects"
            :key="index"
            :title="project.title"
            :copy="project.copy"
            :img-uri="project.imgUri"
            :link-uri="project.linkUri"
          >
          </app-card>
      </section>
      <section class="row" v-if="section === 'technologies'">
          <app-card
            v-for="(technology, index) in technologies"
            :key="index"
            :title="technology.title"
            :copy="technology.copy"
            :img-uri="technology.imgUri"
            :link-uri="technology.linkUri"
            class="app-card"
          >
          </app-card>
      </section>
      <!-- <hr> -->
      <section class="contact">
        <div class="row">
          <h5>Get More Colin In Your Life</h5>
        </div>
        <div class="row">
          <app-card
            v-for="(contactType, index) in contactTypes"
            :key="index"
            :title="contactType.title"
            :copy="contactType.copy"
            :img-uri="contactType.imgUri"
            :link-uri="contactType.linkUri"
          >
          </app-card>
        </div>
      </section>
    </div>

    <footer class="jokes">
      <div class="row">
        <p class="joke">
          {{joke}}
        </p>
      </div>
      <div class="row">
        <p v-if="jokeButtonClicked">
          {{jokeSuccessivePrompt}}
        </p>
        <p v-else>
          {{jokeInitialPrompt}}
        </p>
      </div>
      <div class="row">
          <button
            class="button joke-button"
            type="button"
            @click="getNewJoke"
          >
            {{jokeButtonText}}
          </button>
      </div>
    </footer>

    <template id="app-card-template">
      <div class="card mb-4 box-shadow col-md-4 app-card-template">
        <a :href="linkUri" target="_blank" class="no-link-styles card">
          <div class="card-img-top">
            <img :src="imgUri">
          </div>
          <div class="card-body">
            <h5>{{title}}</h5>
            <p class="card-text">
              {{copy}}
            </p>
          </div>
        </a>
      </div>
    </template>

    <script src="./js/appData.js"></script>
    <script src="./js/appComputed.js"></script>
    <script src="./js/appMethods.js"></script>
    <script src="./js/Card.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/jokes/jokeMethods.js"></script>
    <script src="./js/jokes/jokeData.js"></script>
    <script src="./js/jokes/jokes.js"></script>
  </body>
</html>
